
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Flower</title>
  <link rel="stylesheet" href="flower.css" />
</head>
<body>

  <div class="bg-hearts" id="hearts" aria-hidden="true"></div>

  <main class="phone">
    

    <section class="stage" id="stage" aria-label="Proposal animation">
      <div class="spotlightLayer" aria-hidden="true"></div>
      <div class="nameHeartsLayer" id="nameHeartsLayer" aria-hidden="true"></div>
      <div class="burstLayer" id="burstLayer" aria-hidden="true"></div>
      <div class="petalsLayer" id="petalsLayer"></div>
      <div class="ground"></div>

<div class="person boy" id="boy">
    <div class="nameTag">Abhi</div>
    <div class="head">
      <div class="face">
        <span class="eye left"></span>
        <span class="eye right"></span>
        <span class="nose"></span>
        <span class="smile"></span>
      </div>
    </div>
    <div class="hair"></div>
  
    <div class="body"></div>
  
    <div class="arm"></div>
    <div class="hand"></div>
  
    
    <div class="bouquet" aria-hidden="true">
      <span class="bloom b1"></span>
      <span class="bloom b2"></span>
      <span class="bloom b3"></span>
      <span class="bloom b4"></span>
      <span class="bloom b5"></span>
      <span class="wrap"></span>
      <span class="stem s1"></span>
      <span class="stem s2"></span>
      <span class="leaf l1"></span>
      <span class="leaf l2"></span>
    </div>
  
    <div class="leg left"></div>
    <div class="leg right"></div>
    <div class="shadow"></div>
  </div>


<div class="person girl">
    <div class="nameTag">Khushi</div>
    <div class="head">
      <div class="face">
        <span class="eye left"></span>
        <span class="eye right"></span>
        <span class="nose"></span>
        <span class="smile"></span>
        <span class="blush left"></span>
        <span class="blush right"></span>
      </div>
    </div>
    <div class="hair"></div>
  
    <div class="dress"></div>
    <div class="arm"></div>
  
    <div class="leg left"></div>
    <div class="leg right"></div>
    <div class="shadow"></div>
  </div>
  
      <div class="hint">Tap anywhere to replay ✨</div>
    </section>

  </main>

  <script src="fd.js"></script>
</body>
</html>
